name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/baobab-compta-frontend

            if [ ! -d ".git" ]; then
              git clone https://github.com/Kopa2614/baobab-compta-frontend.git .
            else
              git pull origin main
            fi

            npm ci
            npm run build

            pm2 describe baobab-frontend > /dev/null 2>&1 \
              && pm2 restart baobab-frontend \
              || pm2 start npm --name "baobab-frontend" -- start

            pm2 save
