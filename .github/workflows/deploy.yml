name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_PAT
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin:/usr/bin
            git config --global --add safe.directory /var/www/baobab-compta-frontend
            cd /var/www/baobab-compta-frontend

            if [ ! -d ".git" ]; then
              git clone https://Kopa2614:$GH_PAT@github.com/Kopa2614/baobab-compta-frontend.git .
            else
              git pull https://Kopa2614:$GH_PAT@github.com/Kopa2614/baobab-compta-frontend.git main
            fi

            npm ci
            rm -rf .next
            npm run build

            pm2 describe baobab-frontend > /dev/null 2>&1 \
              && pm2 restart baobab-frontend \
              || pm2 start npm --name "baobab-frontend" -- start

            pm2 save
